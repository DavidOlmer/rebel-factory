<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rebel AI Factory</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="flex">
    <aside class="w-64 bg-gray-900 text-white min-h-screen p-4 fixed">
      <h1 class="text-xl font-bold mb-8">🏭 Rebel AI Factory</h1>
      <nav class="space-y-1">
        <a href="#" onclick="showPage('dashboard')" class="nav-link block px-4 py-2 rounded hover:bg-gray-800">📊 Dashboard</a>
        <a href="#" onclick="showPage('agents')" class="nav-link block px-4 py-2 rounded hover:bg-gray-800">🤖 Agents</a>
        <a href="#" onclick="showPage('templates')" class="nav-link block px-4 py-2 rounded hover:bg-gray-800">📦 Templates</a>
        <a href="#" onclick="showPage('prompts')" class="nav-link block px-4 py-2 rounded hover:bg-gray-800">📝 Prompts</a>
        <a href="#" onclick="showPage('costs')" class="nav-link block px-4 py-2 rounded hover:bg-gray-800">💰 Costs</a>
      </nav>
      <div class="absolute bottom-4 left-4 right-4 bg-gray-800 rounded p-3 text-sm">
        <div class="flex items-center gap-2"><span class="w-2 h-2 bg-green-500 rounded-full"></span> Online</div>
        <div class="text-xs text-gray-500 mt-1">Enterprise v2.0</div>
      </div>
    </aside>
    <main class="ml-64 flex-1 p-8">
      <div id="page-dashboard">
        <h2 class="text-2xl font-bold mb-6">Dashboard</h2>
        <div class="grid grid-cols-4 gap-4 mb-8">
          <div class="bg-white rounded-lg shadow p-4 border-l-4 border-blue-500">
            <div class="text-gray-500 text-sm">Agents</div>
            <div id="stat-agents" class="text-3xl font-bold">-</div>
          </div>
          <div class="bg-white rounded-lg shadow p-4 border-l-4 border-purple-500">
            <div class="text-gray-500 text-sm">Templates</div>
            <div id="stat-templates" class="text-3xl font-bold">-</div>
          </div>
          <div class="bg-white rounded-lg shadow p-4 border-l-4 border-orange-500">
            <div class="text-gray-500 text-sm">Prompts</div>
            <div id="stat-prompts" class="text-3xl font-bold">-</div>
          </div>
          <div class="bg-white rounded-lg shadow p-4 border-l-4 border-green-500">
            <div class="text-gray-500 text-sm">Tokens (Month)</div>
            <div id="stat-tokens" class="text-3xl font-bold">-</div>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-6">
          <div class="bg-white rounded-lg shadow p-6">
            <h3 class="font-bold mb-4">🧠 Learning Insights</h3>
            <div id="insights-list" class="space-y-3"></div>
          </div>
          <div class="bg-white rounded-lg shadow p-6">
            <h3 class="font-bold mb-4">💰 Cost Summary</h3>
            <div id="cost-summary"></div>
          </div>
        </div>
      </div>
      <div id="page-agents" class="hidden">
        <h2 class="text-2xl font-bold mb-6">Agents</h2>
        <div id="agents-grid" class="grid grid-cols-4 gap-4"></div>
      </div>
      <div id="page-templates" class="hidden">
        <h2 class="text-2xl font-bold mb-6">Agent Templates</h2>
        <p class="text-gray-500 mb-4">Pre-built agents for Rebelgroup sectors & services</p>
        <div id="templates-grid" class="grid grid-cols-3 gap-4"></div>
      </div>
      <div id="page-prompts" class="hidden">
        <h2 class="text-2xl font-bold mb-6">Prompt Library</h2>
        <div id="prompts-grid" class="grid grid-cols-3 gap-4"></div>
      </div>
      <div id="page-costs" class="hidden">
        <h2 class="text-2xl font-bold mb-6">Cost Tracking</h2>
        <div id="costs-detail"></div>
      </div>
    </main>
  </div>
  <script>
    const API = window.location.origin + '/api';
    
    function showPage(page) {
      document.querySelectorAll('main > div').forEach(p => p.classList.add('hidden'));
      document.getElementById('page-' + page).classList.remove('hidden');
    }
    
    async function load() {
      try {
        const [stats, agents, templates, prompts, costs, insights] = await Promise.all([
          fetch(API + '/stats').then(r => r.json()),
          fetch(API + '/agents').then(r => r.json()),
          fetch(API + '/templates').then(r => r.json()),
          fetch(API + '/prompts').then(r => r.json()),
          fetch(API + '/costs/summary').then(r => r.json()),
          fetch(API + '/telemetry/insights').then(r => r.json())
        ]);
        
        document.getElementById('stat-agents').textContent = stats.agents?.total || agents.agents?.length || 0;
        document.getElementById('stat-templates').textContent = stats.templates?.total || templates.templates?.length || 0;
        document.getElementById('stat-prompts').textContent = stats.prompts?.total || prompts.prompts?.length || 0;
        document.getElementById('stat-tokens').textContent = ((stats.tokens?.thisMonth || 0) / 1000000).toFixed(0) + 'M';
        
        document.getElementById('agents-grid').innerHTML = (agents.agents || []).map(a => `
          <div class="bg-white rounded-lg shadow p-4">
            <div class="flex items-center gap-2 mb-2">
              <span class="text-2xl">${a.icon || '🤖'}</span>
              <div>
                <div class="font-bold">${a.name}</div>
                <div class="text-sm text-gray-500">${a.role || a.tier}</div>
              </div>
            </div>
            <div class="flex items-center justify-between text-sm">
              <span class="px-2 py-0.5 rounded ${a.tier === 'core' ? 'bg-purple-100 text-purple-700' : a.tier === 'venture' ? 'bg-blue-100 text-blue-700' : 'bg-gray-100'}">${a.tier}</span>
              <span>${a.totalRuns || 0} runs</span>
            </div>
          </div>
        `).join('');
        
        document.getElementById('templates-grid').innerHTML = (templates.templates || []).map(t => `
          <div class="bg-white rounded-lg shadow p-4">
            <div class="flex items-center gap-2 mb-2">
              <span class="text-2xl">${t.icon || '📦'}</span>
              <div class="font-bold">${t.name}</div>
            </div>
            <p class="text-sm text-gray-500 mb-2">${t.description || ''}</p>
            <div class="flex items-center justify-between text-sm">
              <span class="px-2 py-0.5 rounded bg-gray-100">${t.category}</span>
              <span>${t.usageCount || 0} uses</span>
            </div>
          </div>
        `).join('');
        
        document.getElementById('prompts-grid').innerHTML = (prompts.prompts || []).map(p => `
          <div class="bg-white rounded-lg shadow p-4">
            <div class="font-bold mb-1">${p.name}</div>
            <div class="flex items-center justify-between text-sm">
              <span class="px-2 py-0.5 rounded bg-blue-100 text-blue-700">${p.category}</span>
              <span>⭐ ${p.avgRating || '-'}</span>
            </div>
          </div>
        `).join('');
        
        document.getElementById('insights-list').innerHTML = (insights.insights || []).map(i => `
          <div class="p-3 rounded ${i.type === 'drift_warning' ? 'bg-yellow-50 border border-yellow-200' : i.type === 'pattern' ? 'bg-green-50 border border-green-200' : 'bg-blue-50 border border-blue-200'}">
            <div class="font-medium">${i.title}</div>
            <div class="text-sm text-gray-600">${i.description}</div>
          </div>
        `).join('');
        
        document.getElementById('cost-summary').innerHTML = `
          <div class="space-y-4">
            <div class="flex justify-between items-center">
              <span>This Month</span>
              <span class="text-2xl font-bold">$${costs.currentMonth?.totalCost?.toFixed(2) || '0'}</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-4">
              <div class="bg-orange-500 h-4 rounded-full" style="width: ${costs.budget?.percentUsed || 0}%"></div>
            </div>
            <div class="text-sm text-gray-500">${costs.budget?.percentUsed || 0}% of $${costs.budget?.monthly || 0} budget</div>
          </div>
        `;
        
        document.getElementById('costs-detail').innerHTML = `
          <div class="grid grid-cols-2 gap-6">
            <div class="bg-white rounded-lg shadow p-6">
              <h3 class="font-bold mb-4">By Model</h3>
              ${Object.entries(costs.currentMonth?.byModel || {}).map(([m, d]) => `
                <div class="flex justify-between py-2 border-b">
                  <span>${m}</span>
                  <span>$${d.cost?.toFixed(2) || 0}</span>
                </div>
              `).join('')}
            </div>
            <div class="bg-white rounded-lg shadow p-6">
              <h3 class="font-bold mb-4">By Tier</h3>
              ${Object.entries(costs.currentMonth?.byTier || {}).map(([t, d]) => `
                <div class="flex justify-between py-2 border-b">
                  <span class="capitalize">${t}</span>
                  <span>$${d.cost?.toFixed(2) || 0}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      } catch (e) {
        console.error('Load error:', e);
      }
    }
    
    load();
  </script>
</body>
</html>
